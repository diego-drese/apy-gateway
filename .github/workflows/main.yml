name: Build and Deploy Docker Image

on:
  push:
    branches:
      - main  # ou a branch que você quiser usar
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🔧 Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login no DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: 🏗️ Build e Push da imagem Docker
        uses: docker/build-push-action@v5
        with:
            context: .
            file: ./Dockerfile
            push: true
            platforms: linux/amd64
            tags: diegoneumann/daizen:latest
            cache-from: type=registry,ref=diegoneumann/daizen:cache
            cache-to: type=registry,ref=diegoneumann/daizen:cache,mode=max
            build-args: |
              NOVA_USER=${{ secrets.NOVA_USER }}
              NOVA_KEY=${{ secrets.NOVA_KEY }}


